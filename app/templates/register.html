<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI COACH // REGISTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans min-h-screen flex flex-col items-center justify-center">

    <div class="w-full max-w-md p-8">
        <h1 class="text-3xl font-bold mb-2 uppercase tracking-wide">Register</h1>
        <p class="text-gray-500 mb-8 uppercase text-sm tracking-widest border-b border-black pb-4">
            AI Cycling Analytics Core v0.1
        </p>

        <form action="/register" method="POST" class="space-y-6">

            <div>
                <label for="email" class="block text-sm font-bold uppercase tracking-wider mb-2">Email</label>
                <input type="email" id="email" name="email" required
                       class="w-full border border-black p-3 focus:outline-none focus:ring-2 focus:ring-gray-400">
            </div>

            <div>
                <label for="password" class="block text-sm font-bold uppercase tracking-wider mb-2">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full border border-black p-3 focus:outline-none focus:ring-2 focus:ring-gray-400">
            </div>

            <button type="submit"
                    class="w-full bg-black text-white font-bold uppercase tracking-widest py-4 mt-4 hover:bg-gray-800 transition-colors">
                Создать профиль
            </button>
        </form>

        <div class="mt-6 text-center border-t border-gray-200 pt-6">
            <a href="/login" class="text-sm text-gray-500 hover:text-black uppercase tracking-wider transition-colors">
                Already have an account? Log In
            </a>
        </div>
    </div>

</body>
</html>
